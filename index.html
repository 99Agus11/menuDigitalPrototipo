<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"

        crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"

        crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
        integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
        crossorigin="anonymous"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Instrument+Serif:ital@0;1&display=swap"
        rel="stylesheet">

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        :root {
            --cream: #FFF8F0;
            --brown: #6B3A2A;
            --brown-2: #8B4513;
            --rose: #D27D7D;
            --muted: #4B2C20;
        }

        body {
            background: var(--cream);
            color: var(--muted);
            font-family: 'Barlow', sans-serif;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
            min-height: 100dvh;
        }

        .serif {
            font-family: 'Instrument Serif', serif;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(18px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .fade-up {
            animation: fadeUp 0.55s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .fade-in {
            animation: fadeIn 0.3s ease both;
        }

        .glass {
            background: rgba(255, 248, 240, 0.88);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
        }

        /* Card hover lift */
        .card {
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(107, 58, 42, 0.10);
        }

        /* Category pill active glow */
        .pill-active {
            box-shadow: 0 4px 20px rgba(139, 69, 19, 0.25);
        }

        /* Input focus ring */
        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: var(--rose) !important;
            box-shadow: 0 0 0 3px rgba(210, 125, 125, 0.18);
        }

        /* Hero gradient overlay */
        .hero-overlay {
            background: linear-gradient(to bottom, rgba(255, 248, 240, 0) 30%, rgba(255, 248, 240, 1) 100%);
        }

        /* Stagger helper */
        .stagger-1 { animation-delay: 0.05s; }
        .stagger-2 { animation-delay: 0.10s; }
        .stagger-3 { animation-delay: 0.15s; }
        .stagger-4 { animation-delay: 0.20s; }
        .stagger-5 { animation-delay: 0.25s; }
        .stagger-6 { animation-delay: 0.30s; }
        .stagger-7 { animation-delay: 0.35s; }
        .stagger-8 { animation-delay: 0.40s; }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .animate-float {
            animation: float 6s ease-in-out infinite;
        }

        .hover-lift {
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .hover-lift:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 20px 40px rgba(107, 58, 42, 0.12);
        }

        /* Badge tag */
        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 99px;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        /* Scrollbar visible for desktop main area */
        @media (min-width: 768px) {
            .main-scroll::-webkit-scrollbar {
                width: 4px;
            }

            .main-scroll::-webkit-scrollbar-track {
                background: transparent;
            }

            .main-scroll::-webkit-scrollbar-thumb {
                background: rgba(139, 69, 19, 0.15);
                border-radius: 99px;
            }
        }

        /* Responsive grid */
        /* Mobile-first grid (2 columns by default) */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        @media (min-width: 768px) {
            .menu-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 20px;
            }
        }

        @media (min-width: 1280px) {
            .menu-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        /* Desktop layout */
        @media (min-width: 768px) {
            .app-shell {
                display: grid;
                grid-template-columns: 280px 1fr;
                min-height: 100dvh;
            }

            .sidebar {
                position: sticky;
                top: 0;
                height: 100dvh;
                overflow-y: auto;
                border-right: 1px solid rgba(107, 58, 42, 0.07);
                background: var(--cream);
                padding: 40px 28px;
                display: flex;
                flex-direction: column;
                gap: 28px;
            }

            .mobile-nav {
                display: none !important;
            }

            .desktop-main {
                padding: 40px 48px;
            }
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        /* ── Icons ─────────────────────────────────────────────────── */

            <svg width={size} height={size} viewBox={viewBox} fill={fill} stroke="currentColor"

        const IcGlobe = ({ size }) => <Ico size={size} d={<><circle cx="12" cy="12" r="10" /><line x1="2" y1="12" x2="22" y2="12" /><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" /></>} />;
        const IcLock = ({ size }) => <Ico size={size} d={<><rect x="3" y="11" width="18" height="11" rx="2" /><path d="M7 11V7a5 5 0 0 1 10 0v4" /></>} />;
        const IcUnlock = ({ size }) => <Ico size={size} d={<><rect x="3" y="11" width="18" height="11" rx="2" /><path d="M7 11V7a5 5 0 0 1 9.9-1" /></>} />;
        const IcSearch = ({ size = 16 }) => <Ico size={size} d={<><circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" /></>} />;
        const IcTrash = ({ size = 18 }) => <Ico size={size} d={<><polyline points="3 6 5 6 21 6" /><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" /><line x1="10" y1="11" x2="10" y2="17" /><line x1="14" y1="11" x2="14" y2="17" /></>} />;
        const IcPlus = ({ size = 22 }) => <Ico size={size} d={<><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" /></>} />;
        const IcClock = ({ size = 18 }) => <Ico size={size} d={<><circle cx="12" cy="12" r="10" /><polyline points="12 6 12 12 16 14" /></>} />;
        const IcPin = ({ size = 18 }) => <Ico size={size} d={<><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" /><circle cx="12" cy="10" r="3" /></>} />;
        const IcInsta = ({ size = 20 }) => <Ico size={size} d={<><rect x="2" y="2" width="20" height="20" rx="5" /><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z" /><line x1="17.5" y1="6.5" x2="17.51" y2="6.5" /></>} />;
        const IcX = ({ size = 18 }) => <Ico size={size} d={<><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></>} />;
        const IcCoffee = ({ size = 18 }) => <Ico size={size} d={<><path d="M17 8h1a4 4 0 0 1 0 8h-1" /><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4V8z" /><line x1="6" y1="2" x2="6" y2="4" /><line x1="10" y1="2" x2="10" y2="4" /><line x1="14" y1="2" x2="14" y2="4" /></>} />;
        const IcStar = ({ size = 14 }) => <Ico size={size} fill="currentColor" stroke="none" d={<path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />} />;
        const IcEdit = ({ size = 16 }) => <Ico size={size} d={<><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" /><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" /></>} />;
        const IcChevron = ({ size = 14, up = false }) => <Ico size={size} d={<polyline points={up ? "18 15 12 9 6 15" : "6 9 12 15 18 9"} />} />;

        /* ── i18n ────────────────────────────────────────────────────*/
        const i18n = {
            es: {
                tagline: "Nuestra Esencia",
                title: "Donde el café se vuelve un ritual.",
                subtitle: "Especialidad en el corazón de Salta, pensada para amantes de la calma.",
                cats: ['Todas', 'Cafetería', 'Pastelería', 'Salados', 'Bebidas'],
                search: "Buscar un antojo…",
                hours: "Horarios", hoursVal: "Mar – Dom · 08:30 a 21:00 hs",
                location: "Ubicación", address: "España 2812, Salta Capital",
                dailyTitle: "Lo mejor del día",
                dailyLabel: "Lo mejor del día",
                popularTitle: "Los Más Pedidos",
                editor: "Modo Editor", editorSub: "PIN de prueba: 1234",
                addBtn: "Añadir producto",
                addTitle: "Nuevo producto",
                verify: "Verificar",
                wrongPin: "PIN incorrecto",
                formName: "Nombre",
                formDesc: "Descripción",
                formPrice: "Precio ($)",
                formCat: "Categoría",
                formImg: "URL de imagen",
                save: "Guardar producto",
                cancel: "Cancelar",
                featured: "Destacado",
                new: "Nuevo",
                footer: "Diseñado por Agustina · 2026",
                deleteConfirm: "¿Eliminar este producto?",
            },
            en: {
                tagline: "Our Essence",
                title: "Where coffee becomes a ritual.",
                subtitle: "A specialty experience in the heart of Salta, for lovers of calm and taste.",
                cats: ['All', 'Coffee', 'Pastry', 'Savory', 'Drinks'],
                search: "Search for a treat…",
                hours: "Opening Hours", hoursVal: "Tue – Sun · 08:30 to 21:00",
                location: "Location", address: "2812 España St, Salta City",
                dailyTitle: "Best of the Day",
                dailyLabel: "Best of the Day",
                popularTitle: "Most Ordered",
                editor: "Editor Mode", editorSub: "Test PIN: 1234",
                addBtn: "Add product",
                addTitle: "New product",
                verify: "Verify",
                wrongPin: "Wrong PIN",
                formName: "Name",
                formDesc: "Description",
                formPrice: "Price ($)",
                formCat: "Category",
                formImg: "Image URL",
                save: "Save product",
                cancel: "Cancel",
                featured: "Featured",
                new: "New",
                footer: "Designed by Agustina · 2026",
                deleteConfirm: "Delete this product?",
            }
        };

        /* ── Menu data ───────────────────────────────────────────────*/
        const MENU = [
            {
                id: 10, name_es: 'Torta de Chocolate con Ganache', name_en: 'Chocolate Ganache Cake', price: 4500, category: 'Pastelería', dailySpecial: true,
                desc_es: 'Húmeda torta de chocolate con ganache de cacao puro, frambuesas frescas y polvo de oro.',
                desc_en: 'Moist chocolate cake with pure cacao ganache, fresh raspberries and gold dust.',
                image: 'https://images.unsplash.com/photo-1578985545062-69928b1d9587?q=80&w=600'
            },
            {
                id: 1, name_es: 'Flat White Especial', name_en: 'Specialty Flat White', price: 3500, category: 'Cafetería', tag: 'featured', popular: true,
                desc_es: 'Doble shot de espresso con leche microespumada sedosa y arte latte.',
                desc_en: 'Double espresso shot with silky microfoamed milk and latte art.',
                image: 'https://images.unsplash.com/photo-1577968897966-3d4325b36b61?q=80&w=600'
            },
            {
                id: 2, name_es: 'Avocado Toast Rosetta', name_en: 'Rosetta Avocado Toast', price: 5800, category: 'Salados', tag: 'featured', popular: true,
                desc_es: 'Pan de masa madre, palta hass, semillas tostadas y huevo soft.',
                desc_en: 'Sourdough bread, hass avocado, toasted seeds, and soft egg.',
                image: 'https://images.unsplash.com/photo-1525351484163-7529414344d8?q=80&w=600'
            },
            {
                id: 3, name_es: 'Roll de Canela & Nuez', name_en: 'Cinnamon & Walnut Roll', price: 2900, category: 'Pastelería', tag: 'new',
                desc_es: 'Masa brioche con canela de Ceylán, nueces caramelizadas y glaseado real.',
                desc_en: 'Brioche dough with Ceylon cinnamon, caramelized walnuts, and royal icing.',
                image: 'https://images.unsplash.com/photo-1509365465985-25d11c17e812?q=80&w=600'
            },
            {
                id: 4, name_es: 'Iced Rose Latte', name_en: 'Iced Rose Latte', price: 3800, category: 'Bebidas', tag: 'featured', popular: true,
                desc_es: 'Cold brew con infusión de rosas, leche de almendras y flor comestible.',
                desc_en: 'Cold brew with rose infusion, almond milk, and edible flower.',
                image: 'https://images.unsplash.com/photo-1517701604599-bb29b565090c?q=80&w=600'
            },
            {
                id: 5, name_es: 'Croissant de Manteca', name_en: 'Butter Croissant', price: 2400, category: 'Pastelería',
                desc_es: 'Laminado a mano con manteca francesa, crujiente por fuera y esponjoso por dentro.',
                desc_en: 'Hand-laminated with French butter, crispy outside and fluffy inside.',
                image: 'https://images.unsplash.com/photo-1555507036-ab1f4038808a?q=80&w=600'
            },
            {
                id: 6, name_es: 'Tostado de Campo', name_en: 'Country Toast', price: 4200, category: 'Salados',
                desc_es: 'Pan campesino, queso de cabra, tomates cherry y albahaca fresca.',
                desc_en: 'Country bread, goat cheese, cherry tomatoes and fresh basil.',
                image: 'https://images.unsplash.com/photo-1484723091739-30a097e8f929?q=80&w=600'
            },
            {
                id: 7, name_es: 'Cortado Etíope', name_en: 'Ethiopian Cortado', price: 3200, category: 'Cafetería',
                desc_es: 'Single origin Etiopía Yirgacheffe, notas de jazmín y bergamota.',
                desc_en: 'Single origin Ethiopia Yirgacheffe, notes of jasmine and bergamot.',
                image: 'https://images.unsplash.com/photo-1559496417-e7f25cb247f3?q=80&w=600'
            },
            {
                id: 8, name_es: 'Limonada de Jengibre', name_en: 'Ginger Lemonade', price: 2800, category: 'Bebidas', tag: 'new',
                desc_es: 'Limón de huerta, jengibre fresco, miel silvestre y agua con gas.',
                desc_en: 'Orchard lemon, fresh ginger, wild honey and sparkling water.',
                image: 'https://images.unsplash.com/photo-1556679343-c7306c1976bc?q=80&w=600'
            },
            {
                id: 9, name_es: 'Tarta de Limón', name_en: 'Lemon Tart', price: 3100, category: 'Pastelería', popular: true,
                desc_es: 'Crema de limón sobre base sablée, merengue italiano tostado a la llama.',
                desc_en: 'Lemon curd on sablée base, Italian meringue torched to perfection.',
                image: 'https://images.unsplash.com/photo-1464305795204-6f5bbfc7fb81?q=80&w=600'
            },
        ];

        /* ── Category map for filtering ─────────────────────────────*/
        const catMap = { 'All': 'Cafetería', 'Coffee': 'Cafetería', 'Pastry': 'Pastelería', 'Savory': 'Salados', 'Drinks': 'Bebidas' };

        /* ── Tag badge ───────────────────────────────────────────────*/
        const TagBadge = ({ tag, lang }) => {
            if (!tag) return null;
            const labels = { featured: { es: 'Destacado', en: 'Featured' }, new: { es: 'Nuevo', en: 'New' } };
            const colors = { featured: 'bg-amber-50 text-amber-700', new: 'bg-emerald-50 text-emerald-700' };
            return (
                <span className={`badge ${colors[tag]}`}>{labels[tag][lang]}</span>
            );
        };

        /* ── MenuCard ────────────────────────────────────────────────*/
        const MenuCard = ({ item, lang, isAdmin, onDelete, onUpdatePrice, index }) => {
            const [imgErr, setImgErr] = useState(false);
            const [isEditingPrice, setIsEditingPrice] = useState(false);
            const [tempPrice, setTempPrice] = useState(item.price);
            const name = item[`name_${lang}`];
            const desc = item[`desc_${lang}`];
            const delay = (index % 8) + 1;

            const handlePriceSave = () => {
                onUpdatePrice(item.id, parseInt(tempPrice) || 0);
                setIsEditingPrice(false);
            };

            return (
                <div className={`card hover-lift fade-up stagger-${delay} bg-white rounded-[1.4rem] overflow-hidden border border-[#8B4513]/5 shadow-sm active:scale-[0.98] transition-all`}>
                    {/* image */}
                    <div className="p-3 pb-0 relative">
                        <div className="relative w-full aspect-square bg-[#F3EDE8] rounded-[1rem] overflow-hidden">
                            {!imgErr
                                ? <img src={item.image} alt={name} onError={() => setImgErr(true)}
                                    className="w-full h-full object-cover transition-transform duration-1000 hover:scale-110" />
                                : <div className="w-full h-full flex items-center justify-center text-[#8B4513]/20">
                                    <IcCoffee size={20} />
                                </div>
                            }
                        </div>
                        {/* admin delete icon */}
                        {isAdmin && (
                            <button
                                onClick={() => { if (confirm(i18n[lang].deleteConfirm)) onDelete(item.id); }}
                                className="absolute top-5 right-5 w-7 h-7 rounded-full bg-rose-500/90 text-white flex items-center justify-center shadow-md active:scale-90 transition-transform z-20"
                            >
                                <IcTrash size={12} />
                            </button>
                        )}
                    </div>
                    {/* body */}
                    <div className="p-2.5 pb-3">
                        <div className="flex flex-col mb-0.5">
                            <h3 className="serif font-bold text-[#4B2C20] leading-tight text-[12px] line-clamp-1 mb-0.5">{name}</h3>
                            <div className="flex items-center gap-1">
                                <span className="text-[#D27D7D] text-[8px] font-bold">$</span>
                                {isEditingPrice ? (
                                    <div className="flex items-center gap-1">
                                        <input
                                            type="number"
                                            value={tempPrice}
                                            onChange={(e) => setTempPrice(e.target.value)}
                                            onBlur={handlePriceSave}
                                            autoFocus
                                            className="w-16 bg-[#FFF8F0] border border-[#D27D7D]/30 rounded-md px-1 py-0 text-[11px] font-bold text-[#8B4513] outline-none"
                                        />
                                    </div>
                                ) : (
                                    <div className="flex items-center gap-1 group/price">
                                        <span className="serif italic font-bold text-[#8B4513] text-sm">{item.price.toLocaleString()}</span>
                                        {isAdmin && (
                                            <button 
                                                onClick={() => setIsEditingPrice(true)}
                                                className="opacity-0 group-hover/price:opacity-100 transition-opacity text-[#D27D7D] p-1"
                                            >
                                                <IcEdit size={10} />
                                            </button>
                                        )}
                                    </div>
                                )}
                            </div>
                        </div>
                        <p className="text-[#4B2C20]/40 text-[9px] leading-tight italic line-clamp-1">{desc}</p>
                    </div>
                </div>
            );
        };

        /* ── AddProductModal ─────────────────────────────────────────*/
        const AddProductModal = ({ lang, onClose, onAdd }) => {
            const t = i18n[lang];
            const empty = { name_es: '', price: '', category: 'Cafetería', desc_es: '', image: '', tag: '' };
            const [form, setForm] = useState(empty);
            const [loading, setLoading] = useState(false);
            const [aiStatus, setAiStatus] = useState(''); // 'translating' | 'done' | 'error'

            const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!form.name_es || !form.price) return;
                setLoading(true);
                setAiStatus('translating');

                let name_en = '';
                let desc_en = '';

                try {
                    const result = await window.claude.complete({
                        messages: [{
                            role: 'user',
                            content: `Translate these two texts from Spanish to English for a specialty café menu. Respond ONLY with a JSON object with keys "name" and "desc", no extra text.\n\nName: ${form.name_es}\nDescription: ${form.desc_es || '(no description)'}`
                        }]
                    });
                    const parsed = JSON.parse(result.trim());
                    name_en = parsed.name || form.name_es;
                    desc_en = parsed.desc || form.desc_es;
                    setAiStatus('done');
                } catch (err) {
                    // Fallback: keep Spanish as English if translation fails
                    name_en = form.name_es;
                    desc_en = form.desc_es;
                    setAiStatus('error');
                }

                onAdd({
                    ...form,
                    name_en,
                    desc_en,
                    id: Date.now(),
                    price: parseInt(form.price) || 0
                });
                setLoading(false);
                onClose();
            };

            return (
                <div className="fixed inset-0 z-[100] bg-black/60 backdrop-blur-sm flex items-end sm:items-center justify-center fade-in"
                    onClick={onClose}>
                    <div className="bg-white w-full max-w-lg rounded-t-[2rem] sm:rounded-[2rem] shadow-2xl overflow-hidden max-h-[92dvh] flex flex-col"
                        onClick={e => e.stopPropagation()}>
                        {/* header */}
                        <div className="flex items-center justify-between px-6 pt-6 pb-4 border-b border-[#8B4513]/6">

                                                                        <button onClick={() => { if (confirm(t.deleteConfirm)) delItem(item.id); }} className="absolute top-2 right-2 text-rose-500 p-1"><IcTrash size={12} /></button>
                                                                    )}
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                )}
                                            </>
                                        )}
                                    </div>
                                );
                            })()}

                            {filtered.length === 0 ? (
                                <div className="flex flex-col items-center justify-center py-24 text-[#8B4513]/30 space-y-3">
                                    <IcCoffee size={40} />
                                    <p className="text-sm italic">{lang === 'es' ? 'Sin resultados…' : 'No results…'}</p>
                                </div>
                            ) : (
                                <div className="menu-grid">
                                    {filtered.map((item, i) => (
                                        <MenuCard key={item.id} item={item} lang={lang} isAdmin={isAdmin} onDelete={delItem} onUpdatePrice={updatePrice} index={i} />
                                    ))}

                                    {/* Add card (admin) */}
                                    {isAdmin && (
                                        <button onClick={() => setShowAdd(true)}
                                            className="card-wide md:hidden w-full py-10 border-2 border-dashed border-[#8B4513]/15 rounded-3xl flex flex-col items-center justify-center text-[#8B4513]/35 hover:bg-rose-50 transition-colors mt-2 fade-up">
                                            <IcPlus size={28} />
                                            <span className="text-[9px] font-bold uppercase tracking-widest mt-2">{t.addBtn}</span>
                                        </button>
                                    )}
                                </div>
                            )}
                        </main>

                        {/* Mobile footer */}
                        <footer className="md:hidden bg-[#4B2C20] text-[#FFF8F0] pt-12 pb-10 px-8 rounded-t-[2.5rem] text-center">
                            <div className="grid grid-cols-2 gap-6 mb-8">
                                <div className="space-y-2 flex flex-col items-center">
                                    <div className="text-[#D27D7D]"><IcClock /></div>
                                    <p className="text-[9px] font-bold uppercase tracking-widest text-rose-200">{t.hours}</p>
                                    <p className="text-[10px] opacity-60 italic">{t.hoursVal}</p>
                                </div>
                                <div className="space-y-2 flex flex-col items-center">
                                    <div className="text-[#D27D7D]"><IcPin /></div>
                                    <p className="text-[9px] font-bold uppercase tracking-widest text-rose-200">{t.location}</p>
                                    <p className="text-[10px] opacity-60 italic">{t.address}</p>
                                </div>
                            </div>
                            <div className="pt-6 border-t border-white/10 flex flex-col items-center gap-3">
                                <div className="text-[#D27D7D]"><IcInsta /></div>
                                <p className="text-[8px] uppercase tracking-[0.4em] opacity-30 font-bold">{t.footer}</p>
                            </div>
                        </footer>
                    </div>

                    {/* ── Modals ── */}
                    {showPin && <PinModal lang={lang} onClose={() => setShowPin(false)} onSuccess={() => setIsAdmin(true)} />}
                    {showAdd && <AddProductModal lang={lang} onClose={() => setShowAdd(false)} onAdd={addItem} />}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
